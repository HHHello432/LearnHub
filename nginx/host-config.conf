# ⚠️ 部署 LearnHub 后替换 /etc/nginx/sites-enabled/default
# 统一域名入口：http://你的服务器IP/learnhub/ 访问

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # 旧项目入口页
    root /root/projects/frontend;
    index index.html;

    # 原有项目保持兼容（通过 path）
    location /todo/ {
        alias /root/projects/frontend/todo/;
        try_files $uri $uri/ /todo/index.html;
    }

    location /weblog/ {
        alias /root/projects/frontend/ai-weblog/;
        try_files $uri $uri/ /weblog/index.html;
    }

    location /note/ {
        alias /root/projects/frontend/markdown-note/;
        try_files $uri $uri/ /note/index.html;
    }

    # LearnHub 新项目（推荐用子域名或独立端口）
    # 方式1: 独立端口 8080
    # 直接把 docker-compose 的 web 端口映射到 8080
    # 访问 http://IP:8080

    # 方式2: 子路径（需改前端构建）
    location /learnhub/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /learnhub/api/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 默认欢迎页
    location / {
        try_files $uri $uri/ =404;
    }
}
