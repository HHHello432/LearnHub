services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: learnhub-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-learnhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-learnhub123}
      POSTGRES_DB: ${POSTGRES_DB:-learnhub}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-learnhub} -d ${POSTGRES_DB:-learnhub}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 后端 API 服务
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: learnhub-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-learnhub}:${POSTGRES_PASSWORD:-learnhub123}@postgres:5432/${POSTGRES_DB:-learnhub}?schema=public
      JWT_SECRET: ${JWT_SECRET:-learnhub-secret-key-2026}
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./server/prisma:/app/prisma
    command: sh -c "npx prisma db push && node src/index.js"

  # 前端 + Nginx
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: learnhub-web
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"

volumes:
  postgres_data:
